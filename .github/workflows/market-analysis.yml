name: Market Analysis

on:
  workflow_dispatch:
    inputs:
      request_path:
        description: Path to runtime market-analysis request JSON
        required: true
        type: string

permissions:
  contents: write

jobs:
  market-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run market analysis engine
        run: |
          python backend/github_action_market_runner.py --request-path "${{ inputs.request_path }}"

      - name: Commit report output
        run: |
          git config user.name "portfolio-link-bot"
          git config user.email "portfolio-link-bot@users.noreply.github.com"
          git add runtime/market-outputs/*.json
          git commit -m "Write market analysis report [skip ci]" || echo "No report changes to commit"
          git pull --rebase origin main || true
          git push origin HEAD:main
