name: Repo Checks

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'runtime/market-inputs/**'
      - 'runtime/market-outputs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'runtime/market-inputs/**'
      - 'runtime/market-outputs/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run repo checks
        run: npm run check
